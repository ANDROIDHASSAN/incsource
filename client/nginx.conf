# Nginx config for serving the Vite/React SPA and proxying API calls.
server {
    listen       80;
    server_name  _;

    # Compressed responses for text assets.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    root   /usr/share/nginx/html;
    index  index.html;

    # Proxy API requests to the backend "server" service on the compose network.
    # The trailing context is preserved so /api/health -> server:4000/api/health.
    location /api/ {
        proxy_pass         http://server:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA routing: serve index.html for any unmatched path so client-side
    # routes work on hard refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for fingerprinted static assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
